services:
  workbench:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/silentorb-workbench:cached
      - ${TOME_REPO:-../../tome}:/workspaces/silentorb-workbench/repos/tome:cached
      - ${MARLOTH_REPO:-../../marloth-story}:/workspaces/silentorb-workbench/repos/marloth-story:cached
      - ${SILENTORB_WEB_REPO:-../../silentorb-web}:/workspaces/silentorb-workbench/repos/silentorb-web:cached
      - tome-node-modules:/workspaces/silentorb-workbench/repos/tome/node_modules
    ulimits:
      core: 0
    user: vscode
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ollama-bridge:
    image: nginx:alpine
    profiles: ["ollama"]
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./ollama-bridge/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      OLLAMA_BRIDGE_PORT: "${OLLAMA_BRIDGE_PORT:-11435}"
      OLLAMA_HOST_PORT: "${OLLAMA_HOST_PORT:-11434}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:$${OLLAMA_BRIDGE_PORT:-11435}/api/tags || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  tome:
    build:
      context: ${TOME_REPO:-../../tome}
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ${TOME_REPO:-../../tome}:/workspaces/silentorb-workbench/repos/tome:cached
      - ${MARLOTH_REPO:-../../marloth-story}:/workspaces/silentorb-workbench/repos/marloth-story:cached
      - tome-node-modules:/workspaces/silentorb-workbench/repos/tome/node_modules
    environment:
      TOME_CONTENT_PATH: /workspaces/silentorb-workbench/repos/marloth-story/content
      TOME_DB_PATH: /workspaces/silentorb-workbench/repos/marloth-story/data/tome.sqlite
      TOME_EDITOR_DEV_HOST: "0.0.0.0"
    ulimits:
      core: 0
    user: vscode
    working_dir: /workspaces/silentorb-workbench/repos/tome
    command: ["/bin/bash", "scripts/dev-start.sh"]
    ports:
      - "3847:3847"
      - "5173:5173"

volumes:
  tome-node-modules:
